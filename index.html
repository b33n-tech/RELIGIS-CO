<!DOCTYPE html>
<html>
<body>
    <h1>Accueil</h1>
    <div id="auth-box">
        <input id="prenom" placeholder="Prénom"> <input id="nom" placeholder="Nom">
        <button id="btn">Valider</button>
    </div>

    <script type="module">
        import { common } from './common.js'
        
        document.getElementById('btn').onclick = async () => {
            const prenom = document.getElementById('prenom').value
            const nom = document.getElementById('nom').value
            
            const { data: membre } = await common.findMember(prenom, nom)
            
            if (membre) {
                localStorage.setItem('user_id', membre.id)
                await common.logVisit('accueil', membre.id)
                alert("Bienvenue " + prenom)
            } else {
                if(confirm("Pas reconnu. S'inscrire ?")) {
                    const { data: newM } = await common.createMember(prenom, nom)
                    localStorage.setItem('user_id', newM.id)
                    await common.logVisit('accueil', newM.id)
                } else {
                    await common.logVisit('accueil', null)
                }
            }
            window.location.href = 'page2.html'
        }
    </script>
</body>
</html>
